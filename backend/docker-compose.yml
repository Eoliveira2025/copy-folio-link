version: "3.9"

services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    build: .
    command: celery -A app.workers.payment_checker worker --loglevel=info --concurrency=4
    env_file: .env
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: celery -A app.workers.payment_checker beat --loglevel=info
    env_file: .env
    depends_on:
      - redis

  # ─────────────────────────────────────────────────────────
  # copy-engine and mt5-manager run on Windows VPS only.
  # See docker-compose.mt5.yml for those services.
  # ─────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: copytrade
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=16MB
        -c max_connections=200

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy noeviction
        --appendonly yes
        --appendfsync everysec
        --save 900 1
        --save 300 10
    volumes:
      - redis_data:/data

volumes:
  pgdata:
  redis_data:
