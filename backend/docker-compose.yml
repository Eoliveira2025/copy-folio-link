version: "3.9"

services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  celery-worker:
    build: .
    command: celery -A app.workers.payment_checker worker --loglevel=info
    env_file: .env
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: celery -A app.workers.payment_checker beat --loglevel=info
    env_file: .env
    depends_on:
      - redis

  copy-engine:
    build: .
    command: python -m engine.main
    env_file: .env
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 2G

  mt5-manager:
    build: .
    command: python -m mt5_manager.main
    env_file: .env
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 4G

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: copytrade
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  pgdata:
