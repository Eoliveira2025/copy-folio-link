server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        target_label: "container"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "stream"

  # API application logs
  - job_name: api-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: api
          __path__: /var/log/api/*.log

  # Copy Engine logs
  - job_name: engine-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: copy-engine
          __path__: /var/log/engine/*.log

  # MT5 Manager logs
  - job_name: mt5-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: mt5-manager
          __path__: /var/log/mt5/*.log

  # Celery worker logs
  - job_name: celery-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: celery
          __path__: /var/log/celery/*.log
